# Built-in workstream flavors (read-only; versioned with the plugin).
# User selection + custom flavors live in ~/.claude/workstreams/flavors.ini.
# See SPEC.md "## Flavors" for groups, operations, layers, and resolution.

[worktree-management/wmx]
create      = wmx worktree create <branch> --base <base>
remove      = wmx worktree remove <branch>
locate      = wmx worktree path <branch>
open-window = wmx window open <branch>

[worktree-management/git-worktree]
create = git worktree add -b <branch> <path> <base>   ; <path> = ../<repo>.worktrees/<branch>
remove = git worktree remove <path>
locate = git worktree list --porcelain

[spec-driven-development/superpowers]
plan    = superpowers:writing-plans
execute = superpowers:subagent-driven-development
ship    = superpowers:finishing-a-development-branch

[spec-driven-development/none]
plan    = derive tasks from charter + design; write T1.. into progress.md directly
execute = work the first unchecked task directly (TDD if the repo has tests)
ship    = open the PR via the active forge flavor, then mark ready per SPEC

[forge/gh]
default-branch = gh repo view --json defaultBranchRef -q .defaultBranchRef.name
pr-status      = gh pr view --json number,isDraft,state,baseRefName
pr-create      = gh pr create --base <base> --head <branch> --draft
pr-ready       = gh pr ready <pr>
pr-retarget    = gh pr edit <pr> --base <new-base>
